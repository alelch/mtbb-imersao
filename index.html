    <script>
      (function () {
        var prefix = ["https://payment.hotmart.com", "https://pay.hotmart.com"];

        function getUTMParams() {
          var url = new URL(window.location.href);
          var source = url.searchParams.get("utm_source") || "";
          var medium = url.searchParams.get("utm_medium") || "";
          var campaign = url.searchParams.get("utm_campaign") || "";
          var term = url.searchParams.get("utm_term") || "";
          var content = url.searchParams.get("utm_content") || "";
          return { source: source, medium: medium, campaign: campaign, term: term, content: content };
        }

        function appendParams(link) {
          for (var j = 0; j < prefix.length; j++) {
            if (link.href.indexOf(prefix[j]) !== -1) {
              var searchParams = new URLSearchParams(window.location.search).toString();
              if (!searchParams) return;
              // Evita duplicar parâmetros
              if (link.href.indexOf("utm_source") !== -1) return;
              var utms = getUTMParams();
              var sck = utms.source + "|" + utms.medium + "|" + utms.campaign + "|" + utms.term + "|" + utms.content;
              var separator = link.href.indexOf("?") === -1 ? "?" : "&";
              link.href += separator + searchParams + "&src=" + sck + "&sck=" + sck;
            }
          }
        }

        function processLinks() {
          var links = document.querySelectorAll("a");
          for (var i = 0; i < links.length; i++) {
            appendParams(links[i]);
          }
        }

        // Processa apenas links dentro de um nó (mais barato que varrer o documento inteiro)
        function processLinksIn(node) {
          if (!node || node.nodeType !== 1) return;
          if (node.tagName === "A") appendParams(node);
          var links = node.querySelectorAll ? node.querySelectorAll("a") : [];
          for (var i = 0; i < links.length; i++) appendParams(links[i]);
        }

        // Garante que o parâmetro seja aplicado no clique (fallback) — sempre ativo
        document.addEventListener("click", function (e) {
          var el = e.target.closest && e.target.closest("a");
          if (el) appendParams(el);
        }, true);

        // Defere o scan inicial e o observer para depois do load,
        // evitando bloquear TTI durante o render inicial do React.
        function startTracking() {
          processLinks();
          var scheduled = false;
          var pendingNodes = [];

            scheduled = true;

              pendingNodes = [];

        }
